name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-digitalocean
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://kubepreflight.com
    env:
      # See src/content/site.ts and .env.example — bump a release by
      # updating this repository Variable, no source change needed.
      PUBLIC_KUBEPREFLIGHT_VERSION: ${{ vars.KUBEPREFLIGHT_VERSION }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/var/www/kubepreflight' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production website
        run: npm run build:prod

      - name: Configure SSH
        run: |
          mkdir -p -m 700 ~/.ssh
          umask 077
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pinned once by the operator (see docs/deployment.md) — never
          # fetched live during a run, so a run can't be tricked into
          # trusting a spoofed host key on first connect.
          printf '%s\n' "${{ secrets.DEPLOY_HOST_KEY }}" > ~/.ssh/known_hosts

      - name: Upload new release
        run: |
          RELEASE_ID="${{ github.sha }}"
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '$DEPLOY_PATH/releases/$RELEASE_ID'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            dist/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$DEPLOY_PATH/releases/$RELEASE_ID/"

      - name: Sync activation script
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            scripts/deploy/activate-release.sh \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/activate-release.sh"

      - name: Activate release
        run: |
          RELEASE_ID="${{ github.sha }}"
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "ACTIVATE_RELEASE_BASE='$DEPLOY_PATH' bash ~/activate-release.sh '$RELEASE_ID'"
