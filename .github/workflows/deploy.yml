name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      # Bump the KubePreflight release the site is pinned to by updating this
      # repository Variable (Settings -> Secrets and variables -> Actions ->
      # Variables -> KUBEPREFLIGHT_VERSION) and re-running this workflow —
      # no source change needed. Falls back to the last release wired into
      # src/content/site.ts if the Variable isn't set.
      PUBLIC_KUBEPREFLIGHT_VERSION: ${{ vars.KUBEPREFLIGHT_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production website
        run: npm run build:prod

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
